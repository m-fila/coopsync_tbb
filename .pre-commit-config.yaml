repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [file]
        files: \.(c|h|cpp|hpp|ipp|cu|cuh|sycl|hip)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
  - repo: local
    hooks:
      - id: cppcheck
        name: cppcheck
        entry: cppcheck --project=build/compile_commands.json --enable=all --cppcheck-build-dir=build --suppressions-list=cppcheck.suppressions -i "build/_deps/*" --error-exitcode=1 --check-level=exhaustive
        types: [c++]
        language: system
        pass_filenames: false
      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy -p build/compile_commands.json
        types: [c++]
        language: system
        exclude: (_deps|downstream)
