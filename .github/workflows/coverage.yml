name: coverage

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Build + Test + Coverage (gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ lcov

      - name: Configure, build, test (coverage preset)
        run: cmake --workflow --preset coverage

      - name: Collect coverage (lcov)
        run: |
          lcov --capture --initial --directory build --base-directory . --output-file baseline.info \
            --rc lcov_branch_coverage=1
          lcov --capture --directory build --base-directory . --output-file test.info \
            --rc lcov_branch_coverage=1
          lcov --add-tracefile baseline.info --add-tracefile test.info \
            --output-file coverage.info \
            --rc lcov_branch_coverage=1
          lcov --remove coverage.info \
            '/usr/*' \
            '*/_deps/*' \
            '*/tests/*' \
            '*/cmake/downstream/*' \
            --output-file coverage.info \
            --rc lcov_branch_coverage=1
          lcov --list coverage.info --rc lcov_branch_coverage=1

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
