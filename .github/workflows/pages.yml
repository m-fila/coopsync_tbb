name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build Doxygen
        run: |
          sudo apt-get install -y cmake doxygen
          cmake -DCOOPSYNC_TBB_BUILD_DOCS=ON -S ${{ github.workspace }} -B build
          cmake --build build --target coopsync_tbb_docs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'build/html'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
